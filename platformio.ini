[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; 这块板按你的命名是 N16R8（16MB Flash + 8MB OPI PSRAM）
; PlatformIO 自带的 esp32-s3-devkitc-1 页面默认是 N8 / 无 PSRAM，
; 所以这里显式覆盖 flash / psram 配置。
; 若你本地 PlatformIO 版本较老，这组覆盖比单纯 -DBOARD_HAS_PSRAM 更关键。
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs

build_flags =
    -DBOARD_HAS_PSRAM
    ; Serial routes to ESP32-S3 native USB-CDC (the on-board "USB" port, not CH343).
    ; This is the port where ES8388 actually gets its 5V/3v3 supply on this board.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
