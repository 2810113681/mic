# RE1.0 N16R8 — Home Assistant Assist voice satellite
#
# Uses external component re1_es8388 (GitHub) instead of built-in es8388,
# because the RE1.0 board needs the hardware-verified register sequence.
#
# BEFORE COMPILING: replace YOUR_GITHUB_USERNAME below with your GitHub username.
# Repo must be public and contain esphome/components/re1_es8388/

esphome:
  name: tx
  friendly_name: RE1 Voice
  min_version: 2025.6.0

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  variant: esp32s3
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  baud_rate: 115200
  hardware_uart: USB_CDC

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: tx Fallback Hotspot
    password: !secret ota_password

captive_portal:

# Pull re1_es8388 from your public GitHub repo (Raspberry Pi ESPHome can compile this).
external_components:
  - source:
      type: git
      url: https://github.com/2810113681/mic
      ref: main
      path: esphome/components
    components: [re1_es8388]

i2c:
  - id: bus_a
    sda: GPIO14
    scl: GPIO47
    frequency: 100kHz

audio_dac:
  - platform: re1_es8388
    id: re1_dac
    i2c_id: bus_a
    address: 0x10

i2s_audio:
  - id: i2s_bus
    i2s_mclk_pin: GPIO8
    i2s_bclk_pin: GPIO3
    i2s_lrclk_pin: GPIO9

microphone:
  - platform: i2s_audio
    id: board_mic
    adc_type: external
    i2s_din_pin: GPIO10
    i2s_audio_id: i2s_bus
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: stereo

speaker:
  - platform: i2s_audio
    id: board_speaker
    dac_type: external
    i2s_dout_pin: GPIO46
    i2s_audio_id: i2s_bus
    audio_dac: re1_dac
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono
    buffer_duration: 100ms

voice_assistant:
  microphone:
    microphone: board_mic
    channels: 0
    gain_factor: 4
  speaker: board_speaker
  noise_suppression_level: 2
  on_listening:
    - light.turn_on: status_led
  on_end:
    - light.turn_off: status_led

binary_sensor:
  - platform: gpio
    id: btn_assist
    internal: true
    pin:
      number: GPIO12
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      - logger.log: "BTN1 pressed"
      - voice_assistant.start:
          silence_detection: false
    on_release:
      - voice_assistant.stop:

output:
  - platform: gpio
    pin: GPIO21
    id: led_out

light:
  - platform: binary
    id: status_led
    output: led_out
    internal: true
